name: Build Mi 11 Pro SukiSU kernel

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build.yml
      - scripts/**
      - patches/**
  workflow_dispatch:
    inputs:
      mode:
        description: Build a vanilla baseline or integrate SukiSU
        required: true
        default: sukisu
        type: choice
        options:
          - baseline
          - sukisu
      enable_kpm:
        description: Enable KPM support
        required: true
        default: true
        type: boolean
      enable_susfs:
        description: Port SUSFS 2.2.0 to the Xiaomi 5.4 kernel
        required: true
        default: true
        type: boolean
      kernel_ref:
        description: Pinned MIUI SM8350 kernel commit
        required: true
        default: 6cb9f5a9edc161abda546ee23c8f8ba741655746
        type: string
permissions:
  contents: read

concurrency:
  group: mi11pro-kernel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ inputs.mode || 'sukisu' }} / KPM ${{ github.event_name != 'workflow_dispatch' || inputs.enable_kpm }} / SUSFS ${{ github.event_name != 'workflow_dispatch' || inputs.enable_susfs }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      KERNEL_REPO: https://github.com/EndCredits/android_kernel_xiaomi_sm8350-miui.git
      BUILD_MODE: ${{ inputs.mode || 'sukisu' }}
      ENABLE_KPM: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_kpm }}
      ENABLE_SUSFS: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_susfs }}
      KERNEL_REF: ${{ inputs.kernel_ref || '6cb9f5a9edc161abda546ee23c8f8ba741655746' }}
      SUKISU_REF: builtin
      SUSFS_REPO: https://github.com/JackA1ltman/NonGKI_Kernel_Build_2nd.git
      SUSFS_REF: 1ad267cd0a793849127cd549ba460d559017d533
      TOOLCHAIN_URL: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r48/clang-r383902b1.tar.gz
      KBUILD_BUILD_USER: QiaoKes
      KBUILD_BUILD_HOST: github-actions

    steps:
      - name: Check out builder
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            bc bison build-essential ca-certificates curl device-tree-compiler \
            flex gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi git libelf-dev \
            libncurses-dev libssl-dev lld llvm python3 python-is-python3 \
            rsync unzip zip

      - name: Fetch pinned kernel source
        run: |
          git init kernel
          git -C kernel remote add origin "$KERNEL_REPO"
          git -C kernel fetch --depth=1 origin "$KERNEL_REF"
          git -C kernel checkout --detach FETCH_HEAD
          echo "Kernel source: $(git -C kernel rev-parse HEAD)"

      - name: Fetch pinned SUSFS source
        if: env.BUILD_MODE == 'sukisu' && env.ENABLE_SUSFS == 'true'
        run: |
          git init susfs
          git -C susfs remote add origin "$SUSFS_REPO"
          git -C susfs fetch --depth=1 origin "$SUSFS_REF"
          git -C susfs checkout --detach FETCH_HEAD
          echo "SUSFS_COMMIT=$(git -C susfs rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Prepare kernel source
        run: |
          scripts/prepare-kernel.sh \
            kernel \
            "$BUILD_MODE" \
            "$SUKISU_REF" \
            "$ENABLE_KPM" \
            "$ENABLE_SUSFS" \
            "$GITHUB_WORKSPACE/susfs"
          echo "SUKISU_COMMIT=$(git -C kernel/KernelSU rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Restore AOSP Clang cache
        id: clang-cache
        uses: actions/cache/restore@v4
        with:
          path: toolchain
          key: aosp-clang-r383902b1-linux-x86-v1

      - name: Install matching AOSP Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain
          curl --fail --location --show-error --silent \
            "$TOOLCHAIN_URL" \
            --output clang-r383902b1.tar.gz
          tar -xzf clang-r383902b1.tar.gz -C toolchain

      - name: Save AOSP Clang cache
        if: steps.clang-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: toolchain
          key: aosp-clang-r383902b1-linux-x86-v1

      - name: Add compiler to PATH
        run: |
          echo "$GITHUB_WORKSPACE/toolchain/bin" >> "$GITHUB_PATH"

      - name: Show compiler
        run: clang --version

      - name: Restore incremental kernel objects
        id: kernel-cache
        uses: actions/cache/restore@v4
        with:
          path: out
          key: mi11pro-out-${{ runner.os }}-${{ inputs.mode || 'sukisu' }}-${{ env.ENABLE_KPM }}-${{ env.ENABLE_SUSFS }}-${{ env.KERNEL_REF }}-${{ env.SUKISU_REF }}-${{ env.SUKISU_COMMIT }}-${{ env.SUSFS_COMMIT }}-${{ hashFiles('scripts/prepare-kernel.sh', 'patches/**') }}-${{ github.run_id }}
          restore-keys: |
            mi11pro-out-${{ runner.os }}-${{ inputs.mode || 'sukisu' }}-${{ env.ENABLE_KPM }}-${{ env.ENABLE_SUSFS }}-${{ env.KERNEL_REF }}-${{ env.SUKISU_REF }}-${{ env.SUKISU_COMMIT }}-${{ env.SUSFS_COMMIT }}-${{ hashFiles('scripts/prepare-kernel.sh', 'patches/**') }}-
            mi11pro-out-${{ runner.os }}-${{ inputs.mode || 'sukisu' }}-${{ env.ENABLE_KPM }}-${{ env.ENABLE_SUSFS }}-${{ env.KERNEL_REF }}-${{ env.SUKISU_REF }}-${{ env.SUKISU_COMMIT }}-${{ env.SUSFS_COMMIT }}-
            mi11pro-out-${{ runner.os }}-${{ inputs.mode || 'sukisu' }}-${{ env.ENABLE_KPM }}-

      - name: Normalize source timestamps for cached objects
        if: steps.kernel-cache.outputs.cache-matched-key != ''
        run: |
          kernel_epoch=$(git -C kernel show -s --format=%ct HEAD)
          sukisu_epoch=$(git -C kernel/KernelSU show -s --format=%ct HEAD)
          find kernel \
            -type d -name .git -prune -o \
            -type f -not -path 'kernel/KernelSU/*' \
            -exec touch --date="@$kernel_epoch" {} +
          find kernel/KernelSU \
            -type d -name .git -prune -o \
            -type f -exec touch --date="@$sukisu_epoch" {} +
          # A broad fallback may come from an older integration revision.
          # Retimestamp every changed source so make rebuilds only what changed.
          (
            cd kernel
            git diff --name-only -z HEAD -- . ':!KernelSU' | xargs -0 -r touch
            git ls-files --others --exclude-standard -z -- . ':!KernelSU' | xargs -0 -r touch
          )
          (
            cd kernel/KernelSU
            git diff --name-only -z HEAD | xargs -0 -r touch
          )
          echo "Restored: ${{ steps.kernel-cache.outputs.cache-matched-key }}"

      - name: Smoke-build SukiSU objects
        run: |
          make -C kernel \
            O=../out \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            vendor/star_defconfig
          make -C kernel \
            O=../out \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            -j"$(nproc)" \
            init/
          make -C kernel \
            O=../out \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            -j"$(nproc)" \
            security/selinux/
          make -C kernel \
            O=../out \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            -j"$(nproc)" \
            drivers/kernelsu/

      - name: Build star kernel and AnyKernel3
        run: |
          set -o pipefail
          cd kernel
          chmod +x build.sh
          ./build.sh all star 0 2>&1 | tee ../build.log
          test -s ../out/arch/arm64/boot/Image

      - name: Save incremental kernel objects
        if: always()
        uses: actions/cache/save@v4
        with:
          path: out
          key: mi11pro-out-${{ runner.os }}-${{ inputs.mode || 'sukisu' }}-${{ env.ENABLE_KPM }}-${{ env.ENABLE_SUSFS }}-${{ env.KERNEL_REF }}-${{ env.SUKISU_REF }}-${{ env.SUKISU_COMMIT }}-${{ env.SUSFS_COMMIT }}-${{ hashFiles('scripts/prepare-kernel.sh', 'patches/**') }}-${{ github.run_id }}

      - name: Verify and collect release files
        run: |
          scripts/collect-release.sh \
            kernel \
            "$BUILD_MODE" \
            "$ENABLE_KPM" \
            "$ENABLE_SUSFS" \
            "${SUSFS_COMMIT:-not-applicable}"

      - name: Upload kernel package
        uses: actions/upload-artifact@v4
        with:
          name: mi11pro-${{ inputs.mode || 'sukisu' }}-kpm-${{ env.ENABLE_KPM }}-susfs-${{ env.ENABLE_SUSFS }}-${{ github.run_number }}
          path: release/
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mi11pro-build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
